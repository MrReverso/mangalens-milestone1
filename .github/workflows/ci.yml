name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm compile
      - run: pnpm test
      - run: pnpm build

  ocr-benchmark-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build manga-engine image
        run: |
          docker build -t ocr-benchmark-manga-engine -f services/ocr-benchmark/manga_engine/Dockerfile services/ocr-benchmark/manga_engine
      - name: Run pip check (manga-engine)
        run: |
          docker run --entrypoint python ocr-benchmark-manga-engine -m pip check
      - name: Run import/registry health check (manga-engine)
        run: |
          docker run --entrypoint python ocr-benchmark-manga-engine -c "from manga_translator.config import Detector; print('manga_translator registry ok!')"
      - name: Build paddle-engine image
        run: |
          docker build -t ocr-benchmark-paddle-engine -f services/ocr-benchmark/paddle_engine/Dockerfile services/ocr-benchmark/paddle_engine
      - name: Run pip check (paddle-engine)
        run: |
          docker run --entrypoint python ocr-benchmark-paddle-engine -m pip check
      - name: Run PaddleOCR runtime inference (paddle-engine)
        run: |
          docker run --entrypoint python ocr-benchmark-paddle-engine -c "from paddleocr import PaddleOCR; import numpy as np; ocr = PaddleOCR(use_angle_cls=True, lang='en', show_log=False); res = ocr.ocr(np.ones((200, 200, 3), dtype=np.uint8)*255, det=False, rec=True); print('PaddleOCR inference results:', res)"
      - name: Start Docker Compose and execute Orchestrator integration tests
        run: |
          cd services/ocr-benchmark
          docker-compose up --build --exit-code-from benchmark-orchestrator
      - name: Shut down services
        if: always()
        run: |
          cd services/ocr-benchmark
          docker-compose down
      - name: Dump docker-compose logs on failure
        if: failure()
        run: |
          cd services/ocr-benchmark
          docker-compose logs
