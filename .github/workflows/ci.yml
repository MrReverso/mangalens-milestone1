name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm compile
      - run: pnpm test
      - run: pnpm build

  ocr-benchmark-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build manga-engine image
        run: |
          docker build -t ocr-benchmark-manga-engine -f services/ocr-benchmark/manga_engine/Dockerfile services/ocr-benchmark/manga_engine
      - name: Run pip check (manga-engine)
        run: |
          docker run --entrypoint python ocr-benchmark-manga-engine -m pip check
      - name: Run import/registry health check (manga-engine)
        run: |
          docker run --entrypoint python ocr-benchmark-manga-engine -c " \
          from manga_translator.config import Detector, Ocr; \
          from manga_translator.detection import DETECTORS; \
          from manga_translator.ocr import OCRS; \
          assert Detector.default in DETECTORS, 'Detector.default not in DETECTORS'; \
          assert Detector.ctd in DETECTORS, 'Detector.ctd not in DETECTORS'; \
          assert Detector.dbconvnext in DETECTORS, 'Detector.dbconvnext not in DETECTORS'; \
          assert Ocr.ocr48px in OCRS, 'Ocr.ocr48px not in OCRS'; \
          assert Ocr.mocr in OCRS, 'Ocr.mocr not in OCRS'; \
          print('All manga registries verified') \
          "
      - name: Build paddle-engine image
        run: |
          docker build -t ocr-benchmark-paddle-engine -f services/ocr-benchmark/paddle_engine/Dockerfile services/ocr-benchmark/paddle_engine
      - name: Run pip check (paddle-engine)
        run: |
          docker run --entrypoint python ocr-benchmark-paddle-engine -m pip check
      - name: Run PaddleOCR runtime inference (paddle-engine)
        run: |
          docker run --entrypoint python ocr-benchmark-paddle-engine verify_paddle_inference.py
      - name: Start Docker Compose and execute Orchestrator integration tests
        run: |
          cd services/ocr-benchmark
          CI=true docker compose up --build --exit-code-from benchmark-orchestrator
      - name: Shut down services
        if: always()
        run: |
          cd services/ocr-benchmark
          docker compose down
      - name: Dump docker compose logs on failure
        if: failure()
        run: |
          cd services/ocr-benchmark
          docker compose logs
