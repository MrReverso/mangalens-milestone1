version: '3.8'

services:
  ocr-paddle:
    build:
      context: .
      dockerfile: Dockerfile.paddle
    volumes:
      - ./samples:/app/samples
      - ./results:/app/results
    command: --input /app/samples --output /app/results --language ko --engines paddle

  ocr-manga-translator:
    build:
      context: .
      dockerfile: Dockerfile.manga-translator
    volumes:
      - ./samples:/app/samples
      - ./results:/app/results
    command: --input /app/samples --output /app/results --language ja --engines default,ctd,dbconvnext
